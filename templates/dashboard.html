<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard Client - {{ email }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" >
    <!-- Font Awesome CDN -->
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  integrity="sha512-pOaXy+H9yrN+03U7aXLFoRgiBxZ+XQaZZQFnz+6VXq3FeSFiZVbLK3FmVy0b95d7/1zoGz8e+QQ0Rl6XMaY5xg=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer">

    <style>
        /* Reset dan base */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
                Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            min-height: 100vh;
            background-color: #f5f7fa;
            color: #333;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: #1e40af; /* Indigo-700 */
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            transition: width 0.3s ease;
        }
        .sidebar h2 {
            font-weight: 600;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        .sidebar button {
            background: transparent;
            border: none;
            color: #dbeafe; /* lighter indigo */
            padding: 14px 20px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            transition: background-color 0.3s ease, border-left-color 0.3s ease, color 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar button i {
            min-width: 20px;
            font-size: 1.2rem;
            /* warna icon mengikuti text */
            color: inherit;
            transition: color 0.3s ease;
        }
        .sidebar button:hover,
        .sidebar button.active {
            background-color: #2563eb; /* Indigo-600 */
            border-left-color: #60a5fa; /* Indigo-400 */
            color: #fff;
        }

        /* Content area */
        .content-wrapper {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            background-color: #fff;
            box-shadow: inset 0 0 10px #e0e7ff;
            display: flex;
            flex-direction: column;
        }
        .content-wrapper h1 {
            color: #1e40af;
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 700;
            font-size: 2rem;
        }
        .content-wrapper p {
            font-size: 1rem;
            line-height: 1.6;
            color: #444;
        }

        /* File list */
        .file-list {
            margin-top: 2rem;
            padding-left: 1rem;
            max-width: 600px;
        }
        .file-list h3 {
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 1rem;
            font-size: 1.25rem;
        }
        .file-list ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            color: #555;
        }
        .file-list ul li {
            margin-bottom: 0.5rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                padding: 1rem;
                overflow-x: auto;
            }
            .sidebar h2 {
                display: none;
            }
            .sidebar button {
                flex: 1 0 auto;
                text-align: center;
                margin: 0 0.25rem;
                border-left: none;
                border-radius: 8px;
                padding: 10px 12px;
                font-size: 0.9rem;
                justify-content: center;
            }
            .sidebar button i {
                font-size: 1rem;
            }
            .sidebar button.active, .sidebar button:hover {
                border-left: none;
                box-shadow: 0 2px 8px rgba(37, 99, 235, 0.5);
            }
            .content-wrapper {
                padding: 1rem;
            }
            .file-list {
                max-width: 100%;
                margin-top: 1rem;
                padding-left: 0;
            }
        }
    </style>
</head>
<body>

    <nav class="sidebar" role="navigation" aria-label="Sidebar navigation">
        <h2>Dashboard</h2>
        <button class="active" data-section="profile" aria-current="page" onclick="showContent('profile')">
            <i class="fa-solid fa-user"></i> Profil Saya
        </button>
        <button data-section="messages" onclick="showContent('messages')">
            <i class="fa-solid fa-envelope"></i> Pesan
        </button>
        <button data-section="settings" onclick="showContent('settings')">
            <i class="fa-solid fa-gear"></i> Pengaturan
        </button>
    </nav>

    <main class="content-wrapper" id="content-area" tabindex="0" aria-live="polite">
        <h1>Profil Saya</h1>
        <p>Selamat datang, {{ email }}! Ini adalah halaman profil Anda.</p>

        <section class="file-list" aria-label="Daftar file yang diunggah">
            <h3>Daftar File yang Diunggah</h3>
            <ul>
                {% for file in files %}
                <li>{{ file }}</li>
                {% else %}
                <li>Tidak ada file yang diupload.</li>
                {% endfor %}
            </ul>
        </section>
    </main>

    <script>
        const email = {{ email|tojson }};
        function showContent(section) {
            const content = document.getElementById('content-area');
            const buttons = document.querySelectorAll('.sidebar button');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                btn.removeAttribute('aria-current');
            });
            const activeBtn = Array.from(buttons).find(btn => btn.dataset.section === section);
            if (activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.setAttribute('aria-current', 'page');
            }

            let html = '';
            if (section === 'profile') {
                html = `
                    <h1>Profil Saya</h1>
                    <p>Selamat datang, ${email}! Ini adalah halaman profil Anda.</p>
                    <section class="file-list" aria-label="Daftar file yang diunggah">
                        <h3>Daftar File yang Diunggah</h3>
                        <ul>
                            {% for file in files %}
                            <li>{{ file }}</li>
                            {% else %}
                            <li>Tidak ada file yang diupload.</li>
                            {% endfor %}
                        </ul>
                    </section>
                `;
            } else if (section === 'messages') {
                html = `
                    <h1>Pesan</h1>
                    <p>Ini adalah halaman pesan Anda. Belum ada pesan baru.</p>
                `;
            } else if (section === 'settings') {
                html = `
                    <h1>Pengaturan</h1>
                    <p>Atur preferensi dan informasi akun Anda di sini.</p>
                `;
            }
            content.innerHTML = html;
            content.focus();
        }
    </script>

</body>
</html>
